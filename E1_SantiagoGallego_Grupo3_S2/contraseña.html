<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="Css/style.css">
</head>

<body>
     <!-- Barra de Navegación -->
     <header>
      <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="imagenes/logo.png" width="50px" alt="">
           <strong>Level Up Store</strong></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">

              <li class="nav-item">
                <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                   aria-current="page" href="index.html">
                    <img src="imagenes/home.png" width="25px" alt="">
                    <span>Inicio</span>
                </a>
              </li>

              <li class="nav-item">
                <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                  aria-current="page" href="categorias.html">
                    <img src="imagenes/categoria.png" width="25px" alt="">
                    <span>Categorias</span>
                </a>
              </li>
            </ul> 

              <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                    aria-current="page" href="login.html">
                      <img src="imagenes/login.png" width="25px" alt="">
                      <span>Iniciar sesion</span>
                  </a>
                </li> 
              </ul> 

          </div>
        </div>
      </nav>
    </header>

        <!-- Cambiar contraseña -->
        <div class="container mt-5">
            <h1 class="card-title">Recuperar tú contraseña</h1>
                <div class="row justify-content-center">
                    <div class="col-6">
                        <div class="card">
                            <div class="card-body">
                                
                                <form id="contraseña" action="">
   
                                    <div class="mb-3">
                                        <label for="usuario" class="form-label">Ingresa tu correo electrónico para buscar tu cuenta.</label>
                                        <input type="text" class="form-control" id="CorreoE" placeholder="Correo electrónico">
                                        <small class="text-danger" id="CorreoE-Error"></small>  
                                    </div>
                                           
                                    <div class="d-grid mb-3">
                                        <button type="submit" class="btn btn-primary">Buscar</button>
                                    </div>
                                </form>                               
                            </div>
                        </div>
                    </div>
                </div>
                
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>   
    <script>
        document.getElementById("contraseña").addEventListener("submit", function(event){
            event.preventDefault();
            
            let correoE = document.getElementById("CorreoE").value; // Obtener el valor del input
            let correoEError = document.getElementById("CorreoE-Error"); // Referencia al mensaje de error
            correoEError.innerHTML = ""; // Limpiar el mensaje de error al inicio
    
            // Validación del campo
            if(correoE === ""){
                correoEError.innerHTML = "El campo correo electrónico es obligatorio";
            }
            else if(!correoE.includes("@") || !correoE.includes(".")){
                correoEError.innerHTML = "El correo electrónico no es válido";
            }
            else{
                this.submit(); // Si no hay errores, enviar el formulario
            }
        });
    </script>
    
    <footer>
        <div class="container mt-5">
            <div class="row">
                <div class="col-12">
                    <p class="text-center">© 2025 Level Up Store. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>
</body>


</html>
