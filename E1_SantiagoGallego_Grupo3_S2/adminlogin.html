<body>

             <strong>Level Up Store</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">

                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                     aria-current="page" href="index.html">
                      <img src="imagenes/home.png" width="25px" alt="">
                      <span>Inicio</span>
                  </a>
                </li>

                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                    aria-current="page" href="categorias.html">
                      <img src="imagenes/categoria.png" width="25px" alt="">

                <ul class="navbar-nav ms-auto">
                  <li class="nav-item">
                    <a class="nav-link active d-flex flex-column align-items-center text-center gap-1"

            </div>
          </div>
        </nav>
      </header>

        <!-- Inicio de sesion -->
        <div class="container mt-5">
            
    
                <div class="row justify-content-center">
                    <div class="col-6">
                        <h1 class="card-title">Ingresa tus datos de inicio para administradores</h1>
                        <div class="card">
                            <div class="card-body">
                                
                                <form id="login" action="">
   
                                    <div class="mb-3">
                                        <label for="usuario" class="form-label">Usuario administrativo</label>
                                        <input type="text" class="form-control" id="usuario">
                                        <small class="text-danger" id="usuario-error"></small>  
                                    </div>   
    
                                    <div class="mb-3">
                                        <label for="contrasenna" class="form-label">Contraseña</label>
                                        <input type="text" class="form-control" id="contrasenna">
                                        <small class="text-danger" id="contrasenna-error"></small>  
                                    </div>

                                    <div class="mb-3">
                                        <a href="contraseña.html"><label type="submit" class="form label">¿Olvidaste tu contraseña?</label></a>
                                    </div>
       
                                    <div class="d-grid mb-3">
                                        <button type="submit" class="btn btn-primary">Iniciar sesion administrador</button>
                                    </div>
       
                                </form>                               
                            </div>
                        </div>
                    </div>
                </div>
                
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>   
    
    <script>
document.getElementById('login').addEventListener('submit', function(event){
    event.preventDefault();
    
    let usuario = document.getElementById('usuario').value;
    let contrasenna = document.getElementById('contrasenna').value;

    let usuarioError = document.getElementById('usuario-error');
    let contrasennaError = document.getElementById('contrasenna-error');

    usuarioError.innerText = '';
    contrasennaError.innerText = '';

    let valid = true; 

    // Validar usuario vacío
    if (usuario === '') {
        usuarioError.innerText = 'El campo usuario es obligatorio';
        valid = false;
    }

    // Validar contraseña vacía
    if (contrasenna === '') {
        contrasennaError.innerText = 'El campo contraseña es obligatorio';
        valid = false;
    }

    if (!valid) return;

    // Validación de seguridad de la contraseña
    const regexContrasenna = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,18}$/;
    if (!regexContrasenna.test(contrasenna)) {
        contrasennaError.innerText = 'La contraseña debe tener entre 8 y 18 caracteres, incluir al menos una mayúscula, una minúscula, un número y un carácter especial.';
        return; // Detener ejecución si la contraseña no es segura
    }

    // Si todo está correcto, redirigir
    window.location.href = "admin.html";
});

    </script>

    <footer>

            <div class="row">
                <div class="col-12">
                    <p class="text-center">© 2025 Level Up Store. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>  

</body>
