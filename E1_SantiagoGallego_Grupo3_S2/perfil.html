<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="Css/style.css">
</head>

<body>
     <!-- Barra de Navegación -->
     <header>
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
          <div class="container-fluid">
            <a class="navbar-brand" href="#">
              <img src="imagenes/logo.png" width="50px" alt="">
             <strong>Level Up Store</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">

                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                     aria-current="page" href="index.html">
                      <img src="imagenes/home.png" width="25px" alt="">
                      <span>Inicio</span>
                  </a>
                </li>

                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                    aria-current="page" href="categorias.html">
                      <img src="imagenes/categoria.png" width="25px" alt="">
                      <span>Categorias</span>
                  </a>
                </li>
              </ul> 

                <ul class="navbar-nav ms-auto">
                  <li class="nav-item">
                    <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                      aria-current="page" href="carrito.html">
                        <img src="imagenes/carrito.png" width="25px" alt="">
                        <span>Carrito</span>
                    </a>
                  </li> 

                  <li class="nav-item">
                    <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                      aria-current="page" href="login.html">
                        <img src="imagenes/login.png" width="25px" alt="">
                        <span>Iniciar sesion</span>
                    </a>
                  </li> 
                  
                </ul> 

            </div>
          </div>
        </nav>
      </header>

      <div class="container mt-5">
        <div class="card shadow-lg p-3">
            <div class="row g-3 align-items-center">
                <!-- Imagen de perfil -->
                <div class="col-md-4 text-center">
                    <img src="imagenes/iconperfil.png" alt="Perfil" class="rounded-circle img-thumbnail" style="width: 120px; height: 120px;">
                    <input type="file" class="form-control mt-2" accept="image/*">
                </div>
                <!-- Información del usuario -->
                <div class="col-md-8">
                    <h3 class="mb-3">Nombre del Usuario</h3>
                    <p><strong>Email:</strong> usuario@email.com</p>
                    <p><strong>Teléfono:</strong> +123456789</p>
                    <p><strong>Fecha de nacimiento:</strong> 01/01/2000</p>
                    <p><strong>Dirección:</strong> Ciudad, País</p>
                    <button class="btn btn-primary mt-2">Editar Perfil</button>
                    <a href="index.html"><button class="btn btn-danger mt-2">Cerrar Sesión</button></a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>   
    

    <footer>
        <div class="container mt-5">
            <div class="row">
                <div class="col-12">
                    <p class="text-center">© 2025 Level Up Store. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>  

</body>


</html>
