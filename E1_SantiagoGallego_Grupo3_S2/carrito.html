<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="Css/style.css">
</head>

<body>
     <!-- Barra de Navegación -->
     <header>
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
          <div class="container-fluid">
            <a class="navbar-brand" href="#">
              <img src="imagenes/logo.png" width="50px" alt="">
             <strong>Level Up Store</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">

                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                     aria-current="page" href="index.html">
                      <img src="imagenes/home.png" width="25px" alt="">
                      <span>Inicio</span>
                  </a>
                </li>

                <li class="nav-item">
                  <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                    aria-current="page" href="categorias.html">
                      <img src="imagenes/categoria.png" width="25px" alt="">
                      <span>Categorias</span>
                  </a>
                </li>
              </ul> 

                <ul class="navbar-nav ms-auto">
                  <li class="nav-item">
                    <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                      aria-current="page" href="carrito.html">
                        <img src="imagenes/carrito.png" width="25px" alt="">
                        <span>Carrito</span>
                    </a>
                  </li> 

                  <li class="nav-item">
                    <a class="nav-link active d-flex flex-column align-items-center text-center gap-1" 
                      aria-current="page" href="login.html">
                        <img src="imagenes/login.png" width="25px" alt="">
                        <span>Iniciar sesion</span>
                    </a>
                  </li> 
                  
                </ul> 

            </div>
          </div>
        </nav>
      </header>

      <div class="container mt-5">
        <h2 class="text-center">Carrito de Compras 🛒</h2>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <!-- Producto 1 -->
                        <div class="d-flex align-items-center border-bottom pb-3">
                            <img src="imagenes/gtav.jpg" class="img-fluid w-25 rounded" alt="Producto">
                            <div class="ms-3 flex-grow-1">
                                <h5 class="mb-1">GTA V</h5>
                                <p class="mb-1 text-muted">Precio: $29.990</p>
                                <input type="number" class="form-control w-25 d-inline" value="1" min="1">
                            </div>
                            <button class="btn btn-danger btn-sm">
                                <img src="imagenes/eliminar.png" alt="Cerrar" width="20">
                            </button>
                        </div>
    
                        <!-- Producto 2 -->
                            <div class="d-flex align-items-center border-bottom pb-3">
                                <img src="imagenes/fifa.jpg" class="img-fluid w-25 rounded" alt="Producto">
                                <div class="ms-3 flex-grow-1">
                                    <h5 class="mb-1">FIFA 25</h5>
                                    <p class="mb-1 text-muted">Precio: $49.990</p>
                                    <input type="number" class="form-control w-25 d-inline" value="1" min="1">
                                </div>
                                <button class="btn btn-danger btn-sm">
                                    <img src="imagenes/eliminar.png" alt="Cerrar" width="20">
                                </button>
                            </div>
    
                        <!-- Total y botón de compra -->
                        <div class="mt-4 d-flex justify-content-between">
                            <h4>Total: <span id="total">$79.980</span></h4>
                            <button class="btn btn-success">Finalizar compra</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>   
    

    <footer>
        <div class="container mt-5">
            <div class="row">
                <div class="col-12">
                    <p class="text-center">© 2025 Level Up Store. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>  

</body>


</html>
